name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Configure PyO3 Python
        run: echo "PYO3_PYTHON=$(command -v python)" >> "$GITHUB_ENV"

      - name: Sync Python environment
        run: uv sync --extra dev

      - name: Run accepted verification gate
        run: make verify

      - name: Generate full compatibility report
        run: make compat-report-all
